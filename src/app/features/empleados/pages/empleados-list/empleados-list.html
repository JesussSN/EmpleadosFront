<div class="min-h-screen bg-gray-100 p-8">

  <!-- Encabezado -->
  <div class="bg-white rounded-xl shadow-md p-6 mb-6 flex justify-between items-center">

    <div>
      <h1 class="text-3xl font-bold text-slate-700">
        Sistema de Administración de Empleados
      </h1>

      <p class="text-gray-500 mt-2">
        Administra, consulta y registra empleados de forma sencilla.
      </p>
    </div>

  </div>

  <!-- Tarjetas resumen -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">

    <div class="bg-white rounded-xl shadow p-5">
      <p class="text-gray-500 text-sm">
        Total de empleados
      </p>
      <h2 class="text-4xl font-bold text-slate-700 mt-2">
        {{ empleados.length }}
      </h2>
    </div>

    <div class="bg-white rounded-xl shadow p-5">
      <p class="text-gray-500 text-sm">
        Empleados activos
      </p>

      <h2 class="text-4xl font-bold text-green-600 mt-2">
        {{ empleados.filter(e => e.activo).length }}
      </h2>
    </div>

    <div class="bg-white rounded-xl shadow p-5">
      <p class="text-gray-500 text-sm">
        Empleados inactivos
      </p>

      <h2 class="text-4xl font-bold text-slate-700 mt-2">
        {{ empleados.filter(e => !e.activo).length }}
      </h2>
    </div>

  </div>

  <!-- Barra de herramientas -->
  <div class="bg-white rounded-xl shadow p-5 mb-6 flex flex-col md:flex-row gap-4 justify-between">

    <input
      type="text"
      placeholder="Buscar empleado..."
      class="border border-gray-300 rounded-lg px-4 py-2 w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-red-600">

    <div class="flex gap-3">

      <button
        class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg">
        Filtrar
      </button>

      <button
        class="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg">
        Exportar
      </button>

    </div>

  </div>

  <!-- Tabla -->
  <div class="bg-white rounded-xl shadow-md p-6">
    <app-empleado-table
        [empleados]="empleados"
        (editar)="editarEmpleado($event)"
        (eliminar)="eliminarEmpleado($event)">
    </app-empleado-table>
  </div>

</div>
