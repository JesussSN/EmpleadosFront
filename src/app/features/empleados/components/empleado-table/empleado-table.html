<div>

@for(emp of empleados; track emp.id){

<div class="border border-slate-200 rounded-lg p-4 mb-4 shadow-sm hover:shadow-md transition">

    <div class="flex justify-between items-start">

        <div>

            <h2 class="text-xl font-semibold text-slate-800">
                {{ emp.nombre }}
            </h2>

            <p class="text-slate-600 mt-2">
                <strong>Puesto:</strong>
                {{ emp.puesto }}
            </p>

            <p class="text-slate-600">
                <strong>Salario:</strong>
                ${{ emp.salario }}
            </p>

            <p class="mt-2">

                <strong>Estado:</strong>

                @if(emp.activo){

                    <span class="text-emerald-600 font-semibold">
                        Activo
                    </span>

                }@else{

                    <span class="text-orange-500 font-semibold">
                        Inactivo
                    </span>

                }

            </p>

        </div>

        <div class="flex gap-2">

            <button
            (click)="editar.emit(emp)"
            class="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg flex items-center gap-2">

            <i class="pi pi-pencil"></i>
            Editar

        </button>

        <button
            (click)="eliminar.emit(emp.id)"
            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">

            <i class="pi pi-trash"></i>
            Eliminar

        </button>
        </div>

    </div>

</div>

}

</div>
